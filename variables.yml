global_vars:

### -------- INSTITUTIONAL VARIABLES --------- ###
 
#PLEASE NOTE: The variables here are configured for archival repository(ies) which are situated within a larger parent institution (here, a university), and linked to a library. 
#If your organizational structure is not analogous, the expansions related these variables (noted below) may be affected. 
 
#List name of repository or repositories here
#This variable is referenced by: "PREFERCITE" and "BIBLIOGORAPHY - COLLECTION MATERIALS..."
  - name: repository
    type: choice
    params:
      values: 
        - "University of Notre Dame Archives"
        - "Rare Books and Special Collections"
        - "Architecture Archives"

#Enter the name of repository's/ies' parent institution under echo
#This variable is referenced by: "PREFERCITE" and "ODD -- Portions Of Finding Aid Unpublished"
  - name: institution
    type: echo
    params:
      echo: "University of Notre Dame"

#List location of repository or repositories under echo
#This variable is referenced by: "PREFERCITE"
  - name: repository_location
    type: echo
    params:
      echo: "Notre Dame, Indiana"     
 
#If parent institution's internal records are restricted for a prescribed number of years, enter that number under echo
#This variable is utilized by the expansion "ACCESSRESTRICT -- Closed University Records Policy"
  - name: years_local_records_restrict
    type: echo
    params:
      echo: "72"
      

#If repository is associated with (part of/partnered with/etc.) a library, enter folloing "echo"
#This variable is referenced by the expansion "SEPARATEDMATERIAL -- Print in Catalog"
  - name: associated_library
    type: echo
    params:
      echo: "Hesburgh Libraries"


key: val
